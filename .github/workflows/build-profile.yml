name: build-profile

on:
  schedule:
    - cron: '0 3 * * *'   # nightly @ 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'profile/**'
      - '.github/workflows/build-profile.yml'

permissions:
  contents: write

concurrency:
  group: build-profile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Phase 1 · sequential metrics generation (file output to workspace) ──
      # Each step writes its SVG to GITHUB_WORKSPACE via the default output_action,
      # but we pin committer_branch to the work-only "metrics-build" branch so the
      # raw push doesn't pollute master mid-build. We commit + push the consolidated
      # README + SVGs together in Phase 2.

      - name: Generate · profile card
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token:    ${{ secrets.METRICS_TOKEN }}
          user:     howdoiusekeyboard
          template: classic
          filename: metrics/profile.svg
          # Default output_action: commit — writes SVG to workspace AND commits
          # to current branch. Sequential steps avoid race; render-and-commit
          # then pushes the final README on top of the SVG commits.
          config_timezone: UTC
          base: header, activity, community, repositories
          base_indepth: yes
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes

      - name: Generate · isocalendar (half-year)
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token:    ${{ secrets.METRICS_TOKEN }}
          user:     howdoiusekeyboard
          template: classic
          filename: metrics/isocalendar.svg
          # Default output_action: commit — writes SVG to workspace AND commits
          # to current branch. Sequential steps avoid race; render-and-commit
          # then pushes the final README on top of the SVG commits.
          config_timezone: UTC
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Generate · achievements (compact)
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token:    ${{ secrets.METRICS_TOKEN }}
          user:     howdoiusekeyboard
          template: classic
          filename: metrics/achievements.svg
          # Default output_action: commit — writes SVG to workspace AND commits
          # to current branch. Sequential steps avoid race; render-and-commit
          # then pushes the final README on top of the SVG commits.
          config_timezone: UTC
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes

      - name: Generate · screenshot (addressparser)
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token:    ${{ secrets.METRICS_TOKEN }}
          user:     howdoiusekeyboard
          template: classic
          filename: metrics/screenshot-addressparser.svg
          # Default output_action: commit — writes SVG to workspace AND commits
          # to current branch. Sequential steps avoid race; render-and-commit
          # then pushes the final README on top of the SVG commits.
          config_timezone: UTC
          base: ""
          plugin_screenshot: yes
          plugin_screenshot_title: "addressparser · IndicBERT NER"
          plugin_screenshot_url: https://addressparser.kushagragolash.tech
          plugin_screenshot_viewport: '{ "width": 1280, "height": 720 }'
          plugin_screenshot_wait: 4000
          plugin_screenshot_background: yes

      # ── Phase 1.5 · pull latest commits from the metrics steps ──
      # Each metrics step above did its own commit+push to master. Our local
      # checkout is now behind. Fast-forward so we don't re-commit dead state.
      - name: Sync local with metrics commits
        run: |
          git fetch origin master --quiet
          git reset --hard origin/master
          echo "Workspace contents of metrics/ after sync:"
          ls -la metrics/ 2>&1 || echo "(empty)"

      # ── Phase 2 · render README from template + commit everything in one shot ──
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install build deps
        run: |
          npm init -y > /dev/null
          npm install --silent --no-save tsx yaml zod

      - name: Render README from template
        run: npx tsx profile/build.ts

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md 2>/dev/null || true
          # -f bypasses local .gitignore (which excludes metrics/*.svg dev stubs).
          # On CI these are the real Action-generated outputs — force-add to commit them.
          git add -f metrics/*.svg metrics/*.png 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No profile drift; nothing to commit."
            exit 0
          fi
          git commit -m "build: profile refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
